<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Sismobiyofizik Atlası · BAT/KAF/DAF · v8 Final</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; }

  #header {
    padding: 14px 20px;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid rgba(245,158,11,.3);
    display: flex; align-items: center; gap: 12px;
  }
  #header h1 { font-size: 1.05rem; color: #fbbf24; font-weight: 600; }
  #header span { font-size: .8rem; color: #94a3b8; }

  #map { height: calc(100vh - 56px); width: 100%; }

  .legend {
    background: rgba(15,23,42,.92);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: .78rem;
    line-height: 2;
    min-width: 200px;
  }
  .legend h3 { font-size: .82rem; color: #fbbf24; margin-bottom: 6px; }
  .leg-row { display: flex; align-items: center; gap: 8px; }
  .leg-line { width: 28px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .leg-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: .6; }
    50%  { transform: scale(1.5); opacity: .15; }
    100% { transform: scale(1);   opacity: .6; }
  }

  /* Custom popups */
  .leaflet-popup-content-wrapper {
    background: #1e293b;
    border: 1px solid rgba(245,158,11,.4);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .leaflet-popup-content { color: #e2e8f0; font-size: .82rem; line-height: 1.6; margin: 10px 14px; }
  .leaflet-popup-tip-container .leaflet-popup-tip { background: #1e293b; }
  .leaflet-popup-close-button { color: #94a3b8 !important; }
  .popup-title { font-weight: 700; color: #fbbf24; font-size: .9rem; margin-bottom: 4px; }
  .popup-season { display: inline-block; background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.3);
    border-radius: 4px; padding: 1px 7px; font-size: .72rem; color: #fbbf24; margin-bottom: 6px; }
  .popup-tag { display: inline-block; background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
    border-radius: 4px; padding: 1px 6px; font-size: .7rem; color: #a5b4fc; margin: 1px; }
  .popup-fault { font-size: .72rem; color: #94a3b8; margin-top: 6px; border-top: 1px solid rgba(255,255,255,.08); padding-top: 5px; }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:1.3rem;">🍯</span>
  <h1>Türkiye Sismobiyofizik Atlası · ~2.300 km · v8</h1>
  <span>BAT (Normal Fay) · KAF (Sağ Yanal) · DAF (Sol Yanal) | Muğla → Afyon → Bingöl → Hatay | 5 Büyük Deprem · 5 Arı Irkı · Jeo-Biyolojik Atlas</span>
</div>

<div id="map"></div>

<script>
// ── Harita başlat ──────────────────────────────────────────────
const map = L.map('map', {
  center: [39.2, 32.5],
  zoom: 5,
  zoomControl: true
});

// Karanlık tile
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> | Leaflet',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Katman grupları ───────────────────────────────────────────
const lFay    = L.layerGroup(); // Fay Sistemleri
const lRota   = L.layerGroup(); // Bal Yolu + Duraklar
const lDeprem = L.layerGroup(); // Tarihsel Depremler
const lEkotip = L.layerGroup(); // Arı Ekotipleri
const lBal    = L.layerGroup(); // Bal Türleri İkonları

// ── Renk paleti ───────────────────────────────────────────────
const C = {
  naf:    '#f87171',   // kırmızı — Kuzey Anadolu Fayı
  eaf:    '#fb923c',   // turuncu — Doğu Anadolu Fayı
  baf:    '#c084fc',   // mor    — Bitlis-Zagros Kenet Kuşağı
  bat:    '#4ade80',   // yeşil  — Batı Anadolu Genişleme Rejimi
  route:  '#fbbf24',   // sarı   — KAF Bal Yolu rotası
  stop:   '#fbbf24',   // durak işareti
  stopBg: '#1e293b'
};

// BAT — Batı Anadolu Genişleme Rejimi: Menderes Grabenleri + Burdur-Fethiye

// NAF — Kuzey Anadolu Fayı: Karlıova → Erzincan → Tokat → Amasya → Gerede → İzmit → İstanbul

  [39.75, 39.50], // Erzincan

  [40.70, 32.50], // Bolu
  [40.75, 31.20], // Düzce
  [40.77, 30.40], // Sapanca

  [40.95, 27.50]  // Marmara Denizi çıkışı
];

// EAF — Doğu Anadolu Fayı: Karlıova → Palu → Malatya → K.Maraş → Antakya
const eafCoords = [
  [39.35, 41.10], // Karlıova (NAF ile birleşme noktası)
  [38.70, 40.10], // Palu-Elazığ
  [38.40, 39.00], // Pütürge
  [38.15, 38.30], // Malatya yakını
  [37.85, 37.60], // Adıyaman
  [37.60, 37.00], // Narince
  [37.35, 36.70], // Kahramanmaraş
  [37.00, 36.40], // Islahiye
  [36.75, 36.30], // Kırıkhan
  [36.55, 36.20]  // Antakya/İskenderun körfezi
];

// BAF — Bitlis-Zagros Kenet Kuşağı: Van → Bitlis → Muş → güneye kıvrım
const bafCoords = [
  [38.80, 44.00], // Van gölü doğusu
  [38.60, 43.00], // Van
  [38.50, 42.10], // Bitlis
  [38.75, 41.50], // Muş
  [38.35, 40.50], // Bingöl güneyi
  [37.80, 39.50], // Adıyaman-Kahta bölgesi
  [37.20, 38.00], // Güneydoğu geçişi
  [37.10, 37.30]  // BAF-EAF yakınsama
];

// Büyük Menderes Grabeni: Dinar → Nazilli → Söke
const buyukMenderesCoords = [
  [38.07, 30.16], // Dinar
  [37.85, 29.50], // Kuyucak
  [37.91, 28.32], // Nazilli
  [37.75, 27.40]  // Söke / Ege kıyısı
];
// Gediz Grabeni: Gediz → Alaşehir → İzmir
const gedizCoords = [
  [39.04, 29.41], // Gediz
  [38.55, 28.90], // Salihli
  [38.35, 28.51], // Alaşehir
  [38.41, 27.14]  // İzmir körfezi
];
// Burdur-Fethiye Fay Zonu
const burdurFethiyeCoords = [
  [37.72, 30.29], // Burdur

  [36.95, 29.40], // Acıpayam
  [36.65, 29.12]  // Fethiye

L.polyline(buyukMenderesCoords, {

}).bindTooltip('<strong style="color:#4ade80;">Büyük Menderes Grabeni</strong> · Batı Anadolu Genişleme', {sticky:true}).addTo(lFay);

L.polyline(gedizCoords, {
  color: C.bat, weight: 2.5, opacity: .8, dashArray: '6 5'
}).bindTooltip('<strong style="color:#4ade80;">Gediz Grabeni</strong> · Batı Anadolu Genişleme', {sticky:true}).addTo(lFay);

L.polyline(burdurFethiyeCoords, {
  color: C.bat, weight: 2.5, opacity: .8, dashArray: '6 5'
}).bindTooltip('<strong style="color:#4ade80;">Burdur-Fethiye Fay Zonu</strong> · Batı Anadolu Genişleme', {sticky:true}).addTo(lFay);

// Fay çizgilerini çiz
L.polyline(nafCoords, {
  color: C.naf, weight: 3.5, opacity: .85, dashArray: '8 4',
  className: 'naf-line'
}).bindTooltip('<strong style="color:#f87171;">NAF</strong> · Kuzey Anadolu Fayı', {sticky:true}).addTo(lFay);

L.polyline(eafCoords, {
  color: C.eaf, weight: 3.5, opacity: .85, dashArray: '8 4'
}).bindTooltip('<strong style="color:#fb923c;">EAF</strong> · Doğu Anadolu Fayı', {sticky:true}).addTo(lFay);

L.polyline(bafCoords, {
  color: C.baf, weight: 3, opacity: .8, dashArray: '6 5'
}).bindTooltip('<strong style="color:#c084fc;">BAF</strong> · Bitlis-Zagros Kenet Kuşağı', {sticky:true}).addTo(lFay);

// ── KAFZ GANOS UZANTISI — Marmara'dan Ege'ye ─────────────────
const ganosCoords = [
  [40.78, 29.50], // İzmit (NAF ile birleşim)
  [40.85, 28.50], // Marmara Denizi kuzey kıyısı
  [40.70, 27.50], // Tekirdağ / Ganos
  [40.50, 26.70], // Şarköy — deniz çıkışı
  [40.15, 26.00], // Gelibolu — Çanakkale Boğazı
  [39.90, 26.20]  // Çanakkale / Biga
];

// Ganos hattını NAF'tan hafif kuzeye kaydır (offset) + daha kalın/belirgin
const ganosOffset = ganosCoords.map(c => [c[0] + 0.15, c[1]]);
L.polyline(ganosOffset, {
  color: '#34d399', weight: 5, opacity: .95, dashArray: '12 4'
}).bindTooltip('<strong style="color:#34d399;">KAFZ Ganos Uzantısı</strong> · Trakya Koridoru', {sticky:true}).addTo(lFay);

// Kırklareli izole bölge hattı (kuzey blok)
const trakyaCoords = [
  [40.70, 27.50], // Tekirdağ / Ganos
  [41.20, 27.80], // Çerkezköy — Tekirdağ hattı
  [41.60, 27.20], // Kırklareli
  [41.75, 27.50]  // Kofçaz (izole bölge merkezi)
];

L.polyline(trakyaCoords, {
  color: '#34d399', weight: 2.5, opacity: .7, dashArray: '5 7'
}).bindTooltip('<strong style="color:#34d399;">Trakya Uzantısı</strong> · Kırklareli İzole Bölgesi', {sticky:true}).addTo(lFay);

// ── BAL YOLU ROTA ─────────────────────────────────────────────
// Muğla → Antalya/Isparta → İç Anadolu → Karadeniz yayla → Erzincan → Bingöl
const routeCoords = [
  [37.21, 28.36], // 1 Muğla/Marmaris
  [36.89, 30.70], // 2 Antalya
  [37.76, 30.55], // 3 Isparta
  [37.87, 32.49], // 4 Konya
  [38.74, 32.48], // 5 Ankara/Haymana
  [40.31, 36.55], // 6 Tokat/Niksar
  [41.00, 37.87], // 7 Ordu yayla
  [39.90, 38.68], // 8 Erzincan
  [39.14, 40.51], // 9 Bingöl
];

L.polyline(routeCoords, {
  color: C.route, weight: 4, opacity: .9,
  dashArray: null
}).bindTooltip('🍯 Türkiye Bal Yolu · ~1.200 km', {sticky:true}).addTo(lRota);

// Rota üzerinde ok işaretçileri (yön göstergesi)
for (let i = 0; i < routeCoords.length - 1; i++) {
  const mid = [
    (routeCoords[i][0] + routeCoords[i+1][0]) / 2,
    (routeCoords[i][1] + routeCoords[i+1][1]) / 2
  ];
  const angle = Math.atan2(
    routeCoords[i+1][1] - routeCoords[i][1],
    routeCoords[i+1][0] - routeCoords[i][0]
  ) * 180 / Math.PI;
  L.marker(mid, {
    icon: L.divIcon({
      html: `<div style="transform:rotate(${angle}deg);color:#fbbf24;font-size:14px;line-height:1;">➤</div>`,
      iconSize: [16,16], iconAnchor:[8,8], className:''
    }),
    interactive: false
  }).addTo(lRota);
}

// ── POP-UP YARDIMCI FONKSİYONU ────────────────────────────────
function makeCard(s, accentColor, corridorLabel) {
  const tagsHtml = s.tags.map(t =>
    `<span class="popup-tag" style="background:rgba(${accentColor},.12);border-color:rgba(${accentColor},.35);color:rgba(${accentColor},1);">${t}</span>`
  ).join(' ');
  return `
    <div class="popup-title" style="color:rgba(${accentColor},1);">${corridorLabel} — ${s.no} · ${s.title}</div>
    <span class="popup-season" style="background:rgba(${accentColor},.15);border-color:rgba(${accentColor},.3);color:rgba(${accentColor},1);">🗓 ${s.season}</span>
    <table style="width:100%;border-collapse:collapse;margin-top:6px;font-size:.78rem;">
      <tr><td style="padding:3px 0;vertical-align:top;width:22px;">🌋</td>
          <td style="padding:3px 0;vertical-align:top;"><b style="color:#94a3b8;">Jeofizik:</b><br>${s.fault}</td></tr>
      <tr><td style="padding:3px 0;vertical-align:top;">🐝</td>
          <td style="padding:3px 0;vertical-align:top;"><b style="color:#94a3b8;">Ekoloji / Arıcılık:</b><br>${s.bal}<br><em style="color:#c4b5fd;">${s.bio}</em></td></tr>
      <tr><td style="padding:3px 0;vertical-align:top;">🗺️</td>
          <td style="padding:3px 0;vertical-align:top;"><b style="color:#94a3b8;">Jeoturizm:</b><br>${s.jeotour}</td></tr>
    </table>
    <div style="margin-top:5px;">${tagsHtml}</div>
    <div style="font-size:.68rem;color:#475569;margin-top:4px;">${s.km}</div>
  `;
}

// ── DURAK İŞARETÇİLERİ ───────────────────────────────────────
const stops = [
  {
    ll: [37.21, 28.36], no: '01',
    title: 'Muğla / Marmaris — Kızılçam Kışlağı',
    season: 'Kasım – Şubat',
    bal: 'Kızılçam balı (honeydew) · Marchalina hellenica · dünya üretiminin %90\'ı',
    bio: 'A. m. anatoliaca (Ege izolasyonu)',
    fault: 'BAT Düğümü — Menderes + Burdur-Fethiye açılma rejimi · Ca/Mg mineral zenginleşmesi',
    jeotour: 'Muğla Bal Müzesi · kızılçam tarlası gözlem · Datça zeytinyağı-bal güzergahı',
    tags: ['BAT Başlangıcı', 'Kızılçam', 'Dünya %90 honeydew', 'anatoliaca'],
    km: '0 km'
  },
  {
    ll: [36.89, 30.70], no: '02',
    title: 'Antalya / Alanya — Narenciye & Turizm',
    season: 'Mart – Nisan',
    bal: 'Narenciye çiçek balı · limon-portakal aroması',
    bio: 'A. m. anatoliaca / carnica geçişi',
    fault: 'Akdeniz kıyı tektonik terası · Toros dağ ön cephesi',
    jeotour: 'Alanya Kalesi jeopark güzergahı · narenciye bahçesi ziyareti · Konyaaltı sahil kovanları',
    tags: ['Narenciye', 'Çiçek balı', 'Bahar geçişi'],
    km: '~180 km'
  },
  {
    ll: [37.76, 30.55], no: '03',
    title: 'Isparta — Gül Bahçeleri & Yayla',
    season: 'Nisan – Mayıs',
    bal: 'Gül balı · hafif çiçeksi profil · gül yağı sinerjisi',
    bio: 'A. m. anatoliaca (güneybatı Anadolu)',
    fault: 'Isparta Büklümü — NAF öncesi gerilim zonu · Burdur Gölü çöküntüsü',
    jeotour: 'Isparta Gül Festivali (Mayıs) · gül bahçesi kovan deneyimi · Kovada Gölü doğa parkı',
    tags: ['Gül festivali', 'Isparta Büklümü', 'Gülyağı sinerjisi'],
    km: '~280 km'
  },
  {
    ll: [37.87, 32.49], no: '04',
    title: 'Konya / Çumra — Ayçiçeği & Kekik Kuşağı',

    bal: 'Ayçiçeği + kekik balı · tozlaşma hizmeti',

// ── BAT — BATI ANADOLU BAL YOLU: Muğla → Aydın → Denizli → Afyon ─
// (Muğla'dan KAF aksına bağlanan Batı Anadolu Genişleme koridoru)
const batRoute = [
  [37.21, 28.36], // Muğla / Marmaris (BAT başlangıç)
  [37.85, 27.85], // Aydın / Büyük Menderes
  [37.77, 29.09], // Denizli / Pamukkale
  [38.75, 30.54]  // Afyon (KAF aksıyla kavşak)
];

L.polyline(batRoute, {
  color: C.bat, weight: 4, opacity: .9,
  dashArray: null
}).bindTooltip('🟢 BAT Bal Yolu · Batı Anadolu Genişleme · Muğla → Afyon', {sticky:true}).addTo(lRota);

for (let i = 0; i < batRoute.length - 1; i++) {
  const mid = [
    (batRoute[i][0] + batRoute[i+1][0]) / 2,
    (batRoute[i][1] + batRoute[i+1][1]) / 2
  ];
  const angle = Math.atan2(
    batRoute[i+1][1] - batRoute[i][1],
    batRoute[i+1][0] - batRoute[i][0]
  ) * 180 / Math.PI;
  L.marker(mid, {
    icon: L.divIcon({
      html: `<div style="transform:rotate(${angle}deg);color:#4ade80;font-size:14px;line-height:1;">➤</div>`,
      iconSize: [16,16], iconAnchor:[8,8], className:''
    }),
    interactive: false
  }).addTo(lRota);
}
